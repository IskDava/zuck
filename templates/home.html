    </div>
    <main id="main-container">
        <section id="suggestions">
            {% for zuck in zucks %}
            <a href="./play/{{zuck.id}}" class="suggestion-wrapper" style="text-decoration: none;">
                <article class="zuck-suggestion">
                    <img width="150" height="150" class="zuck-avatar"
            src="{% static zuck.id|stringformat:'s' %}/avatar/{{ zuck.avatar }}"
            loading="lazy"
            onerror="this.src=`{% static 'default.jpg' %}`">

                    <div class="vertical-flex">
                        <h2>{{zuck.name}}</h2>
                        <p class="zuck-description">{{zuck.description}}</p>
                    </div>
                </article>
            </a>
            {% endfor %}
        </section>
    </main>
